<div class="admin-page__header">
  <p>Администраторы</p>
  <button (click)="onAddAdminBtn()">Добавить администратора</button>
</div>

<div class="admin-page__content">
  <div class="admin-page__table-wrapper">
    <app-table
      [columnHeaders]="['admin_id', 'Логин', 'Активен', 'Дата рождения', 'Дата создания']"
      [data]="admins"
      (rowClick)="onAdminSelect($event)">
    </app-table>
  </div>

  <aside class="admin-page__aside">
    <!-- Форма добавления -->
    <div class="form-container" *ngIf="asideIndex == 1">
      <header>Добавить администратора</header>
      <main>
        <div class="form-group">
          <label>Логин</label>
          <input [(ngModel)]="newAdmin.admin_login" placeholder="Введите логин" />
        </div>
        <div class="form-group">
          <label>Пароль</label>
          <input type="password" [(ngModel)]="newAdmin.admin_password" placeholder="Введите пароль" />
        </div>
        <div class="form-group">
          <label>Активен</label>
          <input type="checkbox" [(ngModel)]="newAdmin.is_active_admin" />
        </div>
        <div class="form-group">
          <label>Дата рождения</label>
          <input type="date" [(ngModel)]="newAdmin.admin_birth_date" />
        </div>
        <button (click)="onSubmitAdmin()">Сохранить</button>
      </main>
    </div>

    <!-- Форма редактирования -->
    <div class="form-container" *ngIf="asideIndex == 2">
      <header>Редактировать администратора</header>
      <main>
        <div class="form-group">
          <label>ID</label>
          <input [(ngModel)]="selectedAdmin.admin_id" disabled />
        </div>
        <div class="form-group">
          <label>Логин</label>
          <input [(ngModel)]="selectedAdmin.admin_login" placeholder="Введите логин" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input [(ngModel)]="selectedAdmin.email" placeholder="Введите email" />
        </div>
        <div class="form-group">
          <label>Роль</label>
          <select [(ngModel)]="selectedAdmin.role">
            <option value="admin">admin</option>
            <option value="super_admin">super_admin</option>
          </select>
        </div>
        <div class="form-group">
          <label>Активен</label>
          <input type="checkbox" [(ngModel)]="selectedAdmin.is_active_admin" />
        </div>
        <div class="form-group">
          <label>Дата рождения</label>
          <input type="date" [(ngModel)]="selectedAdmin.admin_birth_date" />
        </div>
        <div class="form-buttons">
          <button (click)="onUpdateAdmin()">Обновить</button>
          <button (click)="onCancelEdit()">Отмена</button>
        </div>
      </main>
    </div>
  </aside>
</div>
